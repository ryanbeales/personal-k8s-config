apiVersion: v1
kind: Service
metadata:
  name: maddy
  namespace: maddy
spec:
  selector:
    app: maddy
  ports:
    - name: smtp
      port: 25
      targetPort: 25
    - name: imap
      port: 143
      targetPort: 143
    - name: imaps
      port: 993
      targetPort: 993
    - name: submission
      port: 587
      targetPort: 587
