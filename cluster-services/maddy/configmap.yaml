apiVersion: v1
kind: ConfigMap
metadata:
  name: maddy-config
  namespace: maddy
data:
  maddy.conf: |
    state_dir /data
    runtime_dir /data/run

    tls off

    $(hostname) = maddy.maddy.svc.cluster.local
    $(domain) = ryanbeales.com

    hostname $(hostname)

    auth.pass_table local_authdb {
        table sql_table {
            driver sqlite3
            dsn credentials.db
            table_name passwords
        }
    }

    storage.imapsql local_mailboxes {
        driver sqlite3
        dsn imapsql.db
    }

    smtp tcp://0.0.0.0:25 {
        default_source {
            destination $(domain) {
                deliver_to &local_routing
            }
            destination ryanbeales@gmail.com {
                deliver_to &ses_relay
            }
            default_destination {
                reject 550 5.1.1 "Destination not allowed. Only ryanbeales@gmail.com or local is permitted."
            }
        }
    }

    submission tcp://0.0.0.0:587 {
        auth &local_authdb
        source &local_authdb {
            destination $(domain) {
                deliver_to &local_routing
            }
            destination ryanbeales@gmail.com {
                deliver_to &ses_relay
            }
            default_destination {
                reject 550 5.1.1 "Destination not allowed. Only ryanbeales@gmail.com is permitted."
            }
        }
        default_source {
            reject 501 5.1.1 "Authentication required"
        }
    }

    imap tcp://0.0.0.0:143 {
        auth &local_authdb
        storage &local_mailboxes
    }

    target.queue ses_queue {
        target &ses_relay
        autogenerated_msg_domain $(domain)
    }

    target.smtp ses_relay tcp://email-smtp.us-west-2.amazonaws.com:587 {
        auth plain {env:SES_SMTP_USER} {env:SES_SMTP_PASSWORD}
    }

    target.queue local_routing {
        target &local_mailboxes
    }
