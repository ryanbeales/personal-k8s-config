apiVersion: apps/v1
kind: Deployment
metadata:
  name: maddy
  namespace: maddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maddy
  template:
    metadata:
      labels:
        app: maddy
      annotations:
        config-version: "3"
    spec:
      initContainers:
        - name: init-credentials
          image: python:3.11-alpine
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ryanbeales-smtp-creds
                  key: username
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ryanbeales-smtp-creds
                  key: password
          volumeMounts:
            - name: data
              mountPath: /data
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat << 'EOF' > /tmp/gen.py
              import hmac
              import hashlib
              import base64
              import os

              def sign(key, msg):
                  return hmac.new(key, msg.encode("utf-8"), hashlib.sha256).digest()

              aws_secret = os.environ['AWS_SECRET_ACCESS_KEY']
              region = "us-west-2"
              date = "11111111"
              service = "ses"
              message = "SendRawEmail"
              terminal = "aws4_request"
              version = 0x04

              sig = sign(("AWS4" + aws_secret).encode("utf-8"), date)
              sig = sign(sig, region)
              sig = sign(sig, service)
              sig = sign(sig, terminal)
              sig = sign(sig, message)

              signature_and_version = bytes([version]) + sig
              smtp_password = base64.b64encode(signature_and_version).decode("utf-8")

              os.makedirs('/data/secrets', exist_ok=True)
              with open("/data/secrets/smtp_pass", "w") as f:
                  f.write(smtp_password)
              with open("/data/secrets/smtp_user", "w") as f:
                  f.write(os.environ['AWS_ACCESS_KEY_ID'])
              EOF
              python3 /tmp/gen.py
              
        - name: init-maddy-accts
          image: foxcpp/maddy:0.7.1
          env:
            - name: HERMES_PASSWORD
              value: "hermes-local-imap-pass"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /data/maddy.conf
              subPath: maddy.conf
          command: ["/bin/sh", "-c"]
          args:
            - |
              if ! maddy creds list | grep -q "hermes@ryanbeales.com"; then
                echo "Creating hermes account..."
                echo "$HERMES_PASSWORD" | maddy creds create hermes@ryanbeales.com
                maddy imap-acct create hermes@ryanbeales.com
              fi
      containers:
        - name: maddy
          image: foxcpp/maddy:0.7.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              export SES_SMTP_USER=$(cat /data/secrets/smtp_user)
              export SES_SMTP_PASSWORD=$(cat /data/secrets/smtp_pass)
              exec maddy run
          ports:
            - containerPort: 25
              name: smtp
            - containerPort: 143
              name: imap
            - containerPort: 993
              name: imaps
            - containerPort: 587
              name: submission
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /data/maddy.conf
              subPath: maddy.conf
            - name: tls
              mountPath: /data/tls
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: maddy-data
        - name: config
          configMap:
            name: maddy-config
        - name: tls
          secret:
            secretName: maddy-tls
