apiVersion: apps/v1
kind: Deployment
metadata:
  name: faster-whisper
  namespace: faster-whisper
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: faster-whisper
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: faster-whisper
    spec:
      # Switch to the nvidia runtime class to get access to GPUs
      runtimeClassName: nvidia

      # Schedule faster-whisper on GTX 3060
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-3060

      containers:
        - name: faster-whisper
          # Disable - renovate: datasource=github-tags depname=linuxserver/docker-faster-whisper versioning=docker
          image: lscr.io/linuxserver/faster-whisper:3.3.1-gpu
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Vancouver
            - name: WHISPER_MODEL
              value: distil-whisper/distil-large-v3.5-ct2
            - name: WHISPER_LANG
              value: en
          resources:
            limits:
              nvidia.com/gpu: "1"
          ports:
            - name: faster-whisper
              containerPort: 10300
          volumeMounts:
            - name: storage
              # Models are downloaded and stored in the root home directory
              mountPath: /config
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: faster-whisper-nfs-pvc
