apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnivoice
  namespace: omnivoice
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: omnivoice
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnivoice
    spec:
      # Switch to the nvidia runtime class to get access to the GPU
      runtimeClassName: nvidia

      # Schedule omnivoice on RTX 5060 Ti
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5060-Ti

      containers:
      - name: omnivoice
        image: diogod2r/omnivoice-fastapi:latest
        env:
        - name: TZ
          value: America/Vancouver
        resources:
          limits:
            nvidia.com/gpu: '1'
        ports:
        - name: http
          containerPort: 8880
        volumeMounts:
        - name: storage
          mountPath: /app/models
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: omnivoice-nfs-pvc
