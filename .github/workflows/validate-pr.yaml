name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Tools
        run: |
          mkdir -p $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH
          
          # Install dyff
          DYFF_VERSION=$(curl -s https://api.github.com/repos/homeport/dyff/releases/latest | jq -r .tag_name)
          curl -L "https://github.com/homeport/dyff/releases/download/${DYFF_VERSION}/dyff_${DYFF_VERSION#v}_linux_amd64.tar.gz" | tar xz dyff
          mv dyff $HOME/bin/

          # Install kubeconform
          KC_VERSION=$(curl -s https://api.github.com/repos/yannh/kubeconform/releases/latest | jq -r .tag_name)
          curl -L "https://github.com/yannh/kubeconform/releases/download/${KC_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz kubeconform
          mv kubeconform $HOME/bin/

          # Install pluto
          PLUTO_VERSION=$(curl -s https://api.github.com/repos/FairwindsOps/pluto/releases/latest | jq -r .tag_name)
          curl -L "https://github.com/FairwindsOps/pluto/releases/download/${PLUTO_VERSION}/pluto_${PLUTO_VERSION#v}_linux_amd64.tar.gz" | tar xz pluto
          mv pluto $HOME/bin/

          # Install kube-linter
          KL_VERSION=$(curl -s https://api.github.com/repos/stackrox/kube-linter/releases/latest | jq -r .tag_name)
          curl -L "https://github.com/stackrox/kube-linter/releases/download/${KL_VERSION}/kube-linter-linux.tar.gz" | tar xz kube-linter
          mv kube-linter $HOME/bin/

      - name: Get Changed Directories
        id: changed-dirs
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_exclude_current_dir: true

      - name: Build and Validate
        id: build-validate
        run: bash .github/workflows/scripts/validate_manifests.sh "${{ steps.changed-dirs.outputs.all_changed_files }}"

      - name: Post Comment
        uses: peter-evans/create-or-update-comment@v5
        if: always()
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-validation-report.md
