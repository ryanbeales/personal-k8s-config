apiVersion: tf.upbound.io/v1beta1
kind: Workspace
metadata:
  name: opnsense-config
  namespace: crossplane-system
spec:
  forProvider:
    source: Inline
    initArgs:
      - "-upgrade"
    module: |

      variable "opnsense_api_key" {
        type      = string
        sensitive = true
      }

      variable "opnsense_api_secret" {
        type      = string
        sensitive = true
      }

      terraform {
        required_providers {
          opnsense = {
            source  = "browningluke/opnsense"
            version = "~> 0.22.0"
          }
        }
      }

      provider "opnsense" {
        uri            = "https://10.0.0.1"
        api_key        = var.opnsense_api_key
        api_secret     = var.opnsense_api_secret
        allow_insecure = true
      }

      import {
        to = opnsense_kea_dhcpv4_subnet.lan
        id = "95915423-b0c2-445f-842a-ce31598c0071"
      }

      # Kea DHCP Subnet LAN configuration
      resource "opnsense_kea_dhcpv4_subnet" "lan" {
        subnet      = "10.0.0.0/24"
        description = "LAN Subnet managed via Crossplane Terraform"
        pools       = ["10.0.0.3-10.0.0.254"]
        routers     = ["10.0.0.1"]
        dns_servers = ["10.0.0.1"]
      }

      # WAN Port Forwarding for WireGuard
      resource "opnsense_firewall_nat_port_forward" "wg_easy" {
        enabled     = true
        sequence    = 100
        interface   = ["wan"]
        ip_protocol = "inet"
        protocol    = "udp"
        
        source = {
          net = "any"
        }
        
        destination = {
          net  = "wanip"
          port = "31313"
        }
        
        target = {
          ip   = "10.0.0.59"
          port = "32580"
        }
        
        description = "WAN WireGuard UDP 31313 to k3s NodePort 32580"
      }

      # WAN Firewall Rule to allow WireGuard traffic (associated with NAT)
      resource "opnsense_firewall_filter" "wg_easy" {
        enabled     = true
        description = "Allow inbound WireGuard UDP traffic (NodePort)"
        
        interface = {
          interface = ["wan"]
        }
        
        filter = {
          action      = "pass"
          direction   = "in"
          ip_protocol = "inet"
          protocol    = "UDP"
          
          source = {
            net = "any"
          }
          
          destination = {
            net  = "10.0.0.59"
            port = "32580"
          }
        }
      }

