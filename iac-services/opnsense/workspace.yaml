apiVersion: tf.upbound.io/v1beta1
kind: Workspace
metadata:
  name: opnsense-config
  namespace: crossplane-system
spec:
  forProvider:
    source: Inline
    initArgs:
      - "-upgrade"
    module: |

      variable "opnsense_api_key" {
        type      = string
        sensitive = true
      }

      variable "opnsense_api_secret" {
        type      = string
        sensitive = true
      }

      variable "router_cert" {
        type      = string
        sensitive = true
      }

      variable "router_key" {
        type      = string
        sensitive = true
      }

      terraform {
        required_providers {
          opnsense = {
            source  = "browningluke/opnsense"
            version = "~> 0.22.0"
          }
        }
      }


      provider "opnsense" {
        uri            = "https://10.0.0.1"
        api_key        = var.opnsense_api_key
        api_secret     = var.opnsense_api_secret
        allow_insecure = true
      }

      # 1. Create the system certificate resource on the router
      resource "opnsense_trust_cert" "router_cert" {
        action      = "import"
        description = "router.ryanbeales.com TLS Certificate"
        common_name = "router.ryanbeales.com"
        crt         = base64encode(var.router_cert)
        prv         = base64encode(var.router_key)
      }

      # 2. Kea DHCP Subnet LAN configuration
      # You can add/manage Kea DHCP subnets and static reservations here
      resource "opnsense_kea_dhcpv4_subnet" "lan" {
        subnet      = "10.0.0.0/24"
        description = "LAN Subnet managed via Crossplane Terraform"
        routers     = ["10.0.0.1"]
        dns_servers = ["10.0.0.1"]
      }

      # Example DHCP Reservation (Uncomment or add your own)
      # resource "opnsense_kea_dhcpv4_reservation" "example_host" {
      #   subnet_id   = opnsense_kea_dhcpv4_subnet.lan.id
      #   ip_address  = "10.0.0.100"
      #   mac_address = "aa:bb:cc:dd:ee:ff"
      #   description = "Example static reservation"
      # }
    env:
      - name: TF_VAR_opnsense_api_key
        secretKeyRef:
          namespace: crossplane-system
          name: opnsense-creds
          key: api-key
      - name: TF_VAR_opnsense_api_secret
        secretKeyRef:
          namespace: crossplane-system
          name: opnsense-creds
          key: api-secret
      - name: TF_VAR_router_cert
        secretKeyRef:
          namespace: crossplane-system
          name: router-ryanbeales-com-tls
          key: tls.crt
      - name: TF_VAR_router_key
        secretKeyRef:
          namespace: crossplane-system
          name: router-ryanbeales-com-tls
          key: tls.key

  writeConnectionSecretToRef:
    namespace: crossplane-system
    name: opnsense-workspace-secret
