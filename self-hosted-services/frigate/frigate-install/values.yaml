# see https://artifacthub.io/packages/helm/blakeblackshear/frigate for hints...
env:
  TZ: America/Vancouver
  OMP_WAIT_POLICY: PASSIVE
  OPENAI_BASE_URL: http://llama-gemma4-12b.llama.svc.cluster.local:8000/v1

envFromSecrets:
  - reocam-password
  - armcrest-front-password

image:
  # https://github.com/blakeblackshear/frigate/releases
  # renovate: datasource=docker depname=ghcr.io/blakeblackshear/frigate versioning=docker
  tag: 0.17.2-tensorrt

ingress:
  enabled: false

gpu:
  nvidia:
    enabled: true
    runtimeClassName: nvidia

persistence:
  config:
    enabled: true
    existingClaim: frigate-config-nfs-claim
  media:
    enabled: true
    existingClaim: frigate-media-nfs-claim

probes:
  startup:
    enabled: true

proxy:
  default_role: admin

nodeSelector:
  nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5060-Ti

extraInitContainers:
  - name: generate-yolov9-model
    image: python:3.11
    command: ["/bin/sh", "-c"]
    args:
      - |
        MODEL_SIZE="m"
        IMG_SIZE="320"
        MODEL_PATH="/config/models/yolov9-${MODEL_SIZE}-${IMG_SIZE}-ultralytics-opset12.onnx"
        LABEL_PATH="/config/models/coco-80.txt"
        
        mkdir -p /config/models
        
        # Generate the exact 80-class labelmap expected by YOLOv9
        cat << 'EOF' > $LABEL_PATH
        person
        bicycle
        car
        motorcycle
        airplane
        bus
        train
        truck
        boat
        traffic light
        fire hydrant
        stop sign
        parking meter
        bench
        bird
        cat
        dog
        horse
        sheep
        cow
        elephant
        bear
        zebra
        giraffe
        backpack
        umbrella
        handbag
        tie
        suitcase
        frisbee
        skis
        snowboard
        sports ball
        kite
        baseball bat
        baseball glove
        skateboard
        surfboard
        tennis racket
        bottle
        wine glass
        cup
        fork
        knife
        spoon
        bowl
        banana
        apple
        sandwich
        orange
        broccoli
        carrot
        hot dog
        pizza
        donut
        cake
        chair
        couch
        potted plant
        bed
        dining table
        toilet
        tv
        laptop
        mouse
        remote
        keyboard
        cell phone
        microwave
        oven
        toaster
        sink
        refrigerator
        book
        clock
        vase
        scissors
        teddy bear
        hair drier
        toothbrush
        EOF
        
        if [ -f "$MODEL_PATH" ]; then
          echo "Model $MODEL_PATH already exists, skipping export."
          exit 0
        fi
        
        echo "Exporting YOLOv9 ${MODEL_SIZE} model using Ultralytics..."
        apt-get update && apt-get install --no-install-recommends -y libgl1 libglib2.0-0 curl
        
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="/root/.local/bin:$PATH"
        
        # Install Ultralytics and export directly to opset 12
        uv pip install --system ultralytics onnx onnxslim
        yolo export model=yolov9${MODEL_SIZE}.pt format=onnx opset=12 simplify=True imgsz=${IMG_SIZE}
        
        cp yolov9${MODEL_SIZE}.onnx $MODEL_PATH
        echo "Successfully exported model to $MODEL_PATH"
    volumeMounts:
      - name: config
        mountPath: /config