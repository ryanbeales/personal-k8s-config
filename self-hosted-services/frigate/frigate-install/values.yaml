# see https://artifacthub.io/packages/helm/blakeblackshear/frigate for hints...
env:
  TZ: America/Vancouver
  OMP_WAIT_POLICY: PASSIVE
  OPENAI_BASE_URL: http://llama-gemma4-12b.llama.svc.cluster.local:8000/v1

envFromSecrets:
  - reocam-password
  - armcrest-front-password

image:
  # https://github.com/blakeblackshear/frigate/releases
  # renovate: datasource=docker depname=ghcr.io/blakeblackshear/frigate versioning=docker
  tag: 0.17.2-tensorrt

ingress:
  enabled: false

gpu:
  nvidia:
    enabled: true
    runtimeClassName: nvidia

persistence:
  config:
    enabled: true
    existingClaim: frigate-config-nfs-claim
  media:
    enabled: true
    existingClaim: frigate-media-nfs-claim

probes:
  startup:
    enabled: true

proxy:
  default_role: admin

nodeSelector:
  nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5060-Ti

extraInitContainers:
  - name: generate-yolov9-model
    image: python:3.11
    command: ["/bin/sh", "-c"]
    args:
      - |
        MODEL_SIZE="m"
        IMG_SIZE="320"
        MODEL_PATH="/config/models/yolov9-${MODEL_SIZE}-${IMG_SIZE}.onnx"
        
        if [ -f "$MODEL_PATH" ]; then
          echo "Model $MODEL_PATH already exists, skipping export."
          exit 0
        fi
        
        echo "Exporting YOLOv9 ${MODEL_SIZE} model..."
        apt-get update && apt-get install --no-install-recommends -y cmake libgl1 git curl wget ca-certificates
        
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="/root/.local/bin:$PATH"
        
        mkdir -p /yolov9
        cd /yolov9
        git clone https://github.com/WongKinYiu/yolov9.git .
        
        uv pip install --system -r requirements.txt
        uv pip install --system onnx==1.18.0 onnxruntime onnx-simplifier==0.4.* onnxscript pandas
        
        wget -q https://github.com/WongKinYiu/yolov9/releases/download/v0.1/yolov9-${MODEL_SIZE}-converted.pt -O yolov9-${MODEL_SIZE}.pt
        
        sed -i "s/ckpt = torch.load(attempt_download(w), map_location='cpu')/ckpt = torch.load(attempt_download(w), map_location='cpu', weights_only=False)/g" models/experimental.py
        
        python3 export.py --weights ./yolov9-${MODEL_SIZE}.pt --imgsz ${IMG_SIZE} --simplify --include onnx
        
        mkdir -p /config/models
        cp yolov9-${MODEL_SIZE}.onnx $MODEL_PATH
        echo "Successfully exported model to $MODEL_PATH"
    volumeMounts:
      - name: config
        mountPath: /config