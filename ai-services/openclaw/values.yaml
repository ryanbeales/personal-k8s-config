# OpenClaw Helm Values
# Upstream: https://github.com/serhanekicii/openclaw-helm

app-template:
  controllers:
    main:
      containers:
        main:
          env:
            OLLAMA_BASE_URL: "http://ollama-large.ollama.svc.cluster.local:11434"
            OPENCLAW_MODEL: "ollama/gemma4:26b"
            SEARXNG_URL: "http://searxng.searxng.svc.cluster.local:8080"
            OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLYALLOWHOSTHEADERORIGINFALLBACK: "true"
            OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS: '["https://openclaw.crobceratops.ryanbeales.com", "https://openclaw.crobasaurusrex.ryanbeales.com"]'
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
  
  service:
    main:
      ports:
        http:
          port: 18789

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      storageClass: "crobasaurusrex-nfs"
      accessMode: ReadWriteOnce
      size: 5Gi

  skills:
    - searxng-local-search
