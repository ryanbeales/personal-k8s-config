# OpenClaw Helm Values
# Upstream: https://github.com/serhanekicii/openclaw-helm

app-template:
  controllers:
    main:
      containers:
        main:
          env:
            OLLAMA_BASE_URL: "http://ollama-large.ollama.svc.cluster.local:11434"
            OPENCLAW_MODEL: "ollama/gemma4:26b"
            SEARXNG_URL: "http://searxng.searxng.svc.cluster.local:8080"
          envFrom:
            - secretRef:
                name: openclaw-secret
          resources:


            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
  
  service:
    main:
      ports:
        http:
          port: 18789

  configMaps:
    config:
      enabled: true
      data:
        "openclaw.json": |
          {
            "gateway": {
              "port": 18789,
              "mode": "local",
              "trustedProxies": [
                "127.0.0.1",
                "10.0.0.0/8",
                "10.42.0.0/16"
              ],
              "controlUi": {
                "dangerouslyAllowHostHeaderOriginFallback": true,
                "allowedOrigins": [
                  "https://openclaw.crobceratops.ryanbeales.com",
                  "https://openclaw.crobasaurusrex.ryanbeales.com"
                ]
              }
            },
            "browser": {
              "enabled": true,
              "defaultProfile": "default",
              "profiles": {
                "default": {
                  "cdpUrl": "http://localhost:9222",
                  "color": "#4285F4"
                }
              }
            },
            "agents": {
              "defaults": {
                "workspace": "/home/node/.openclaw/workspace",
                "model": {
                  "primary": "anthropic/claude-opus-4-6"
                },
                "userTimezone": "UTC",
                "timeoutSeconds": 600,
                "maxConcurrent": 1
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "identity": {
                    "name": "OpenClaw",
                    "emoji": "🦞"
                  }
                }
              ]
            },
            "session": {
              "scope": "per-sender",
              "store": "/home/node/.openclaw/sessions",
              "reset": {
                "mode": "idle",
                "idleMinutes": 60
              }
            },
            "logging": {
              "level": "info",
              "consoleLevel": "info",
              "consoleStyle": "compact",
              "redactSensitive": "tools"
            },
            "tools": {
              "profile": "full",
              "web": {
                "search": {
                  "enabled": false
                },
                "fetch": {
                  "enabled": true
                }
              }
            }
          }

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      storageClass: "crobasaurusrex-nfs"
      accessMode: ReadWriteOnce
      size: 5Gi

  skills:
    - searxng-local-search
