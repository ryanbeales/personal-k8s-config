apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opencode-container

resources:
  - namespace.yaml
  - httproute.yaml

helmCharts:
  - name: opencode
    includeCRDs: true
    valuesFile: values.yaml
    releaseName: opencode
    repo: oci://ghcr.io/ryanbeales/charts
    version: 1.1.0


