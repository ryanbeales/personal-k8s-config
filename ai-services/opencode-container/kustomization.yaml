apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opencode-container

resources:
  - namespace.yaml

helmCharts:
  - name: opencode
    includeCRDs: true
    valuesFile: values.yaml
    releaseName: opencode
    repo: oci://ghcr.io/ryanbeales/charts
    version: 1.0.0

patches:
  - target:
      kind: Deployment
      name: ollama
    patch: |-
      - op: add
        path: /spec/template/spec/runtimeClassName
        value: nvidia
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.io/hostname: crobputer
