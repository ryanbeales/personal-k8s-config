# Configuration for opencode-container stack
persistence:
  enabled: true
  storageClass: "crobasaurus-nfs"
  size: 128Gi
  accessModes:
    - ReadWriteOnce

ollama:
  enabled: true
  resources:
    limits:
      nvidia.com/gpu: 1
  runtimeClassName: "nvidia"
  nodeSelector:
    kubernetes.io/hostname: crobputer

config:
  opencodeJson: |
    {
      "model": "ollama/gpt-oss:20b",
      "enabled_providers": ["ollama"],
      "provider": {
        "ollama": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "Ollama",
          "options": {
            "baseURL": "http://ollama:11434/v1"
          },
          "models": {
            "gpt-oss:20b": { "name": "gpt-oss:20b" }
          }
        }
      }
    }
