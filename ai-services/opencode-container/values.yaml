# Configuration for opencode-container stack
runAsRoot: true
splitDeployment: false
persistence:
  enabled: true
  storageClass: "crobasaurusrex-nfs"
  size: 128Gi
  accessModes:
    - ReadWriteMany

ollama:
  enabled: true
  resources:
    limits:
      nvidia.com/gpu: 1
  runtimeClassName: "nvidia"
  nodeSelector:
    kubernetes.io/hostname: crobputer

config:
  opencodeJson: |
    {
      "model": "ollama/gemma4:31b",
      "enabled_providers": ["ollama"],
      "provider": {
        "ollama": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "Ollama",
          "options": {
            "baseURL": "http://ollama:11434/v1"
          },
          "models": {
            "gemma4:31b": { "name": "gemma4:31b" }
          }
        }
      }
    }
