apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      containers:
        - name: open-webui
          # renovate: datasource=github-tags depname=open-webui/open-webui versioning=semver
          image: ghcr.io/open-webui/open-webui:v0.8.12
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: DEFAULT_MODELS
              value: "gemma4:e4b"
            - name: ENABLE_WEB_SEARCH
              value: "true"
            - name: WEBUI_URL
              value: https://open-webui.crobasaurusrex.ryanbeales.com
            - name: WEB_SEARCH_RESULT_COUNT
              value: "3"
            - name: WEB_SEARCH_ENGINE
              value: searxng
            - name: SEARXNG_QUERY_URL
              value: http://searxng.searxng.svc.cluster.local:8080/search?q=<query>
          ports:
            - name: open-webui
              containerPort: 8080
          volumeMounts:
            - name: storage
              # Models are downloaded and stored in the root home directory
              mountPath: /app/backend/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: open-webui-nfs-pvc
