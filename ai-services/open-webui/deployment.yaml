apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - croblodocus
                      - crobceratops
      containers:
        - name: open-webui
          # renovate: datasource=github-tags depname=open-webui/open-webui versioning=semver
          image: ghcr.io/open-webui/open-webui:v0.10.1
          env:
            # llama.cpp exposes an OpenAI-compatible API — connect both the 12b (default)
            # and 26b instances as separate OpenAI API connections.
            # Format: name;base_url;key (semicolon-separated, pipe-delimited entries)
            - name: OPENAI_API_BASE_URLS
              value: "http://llama-gemma4-12b.llama.svc.cluster.local:8000/v1;http://llama-gemma4-26b.llama.svc.cluster.local:8000/v1"
            - name: OPENAI_API_KEYS
              value: "sk-no-key;sk-no-key"
            - name: DEFAULT_MODELS
              value: "google/gemma-4-12B-it-qat-q4_0-gguf"
            - name: ENABLE_WEB_SEARCH
              value: "true"
            - name: WEBUI_URL
              value: https://open-webui.crobasaurusrex.ryanbeales.com
            - name: WEB_SEARCH_RESULT_COUNT
              value: "3"
            - name: WEB_SEARCH_ENGINE
              value: searxng
            - name: SEARXNG_QUERY_URL
              value: http://searxng.searxng.svc.cluster.local:8080/search?q=<query>
          ports:
            - name: open-webui
              containerPort: 8080
          volumeMounts:
            - name: storage
              # Models are downloaded and stored in the root home directory
              mountPath: /app/backend/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: open-webui-nfs-pvc
