apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # Explicit individual models
      - model_name: gemma-4-26B
        litellm_params:
          model: openai/gemma-4-26B_q4_0-it.gguf
          api_base: http://llama-gemma4-26b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"
          max_parallel_requests: 2
      - model_name: gemma-4-12B
        litellm_params:
          model: openai/gemma-4-12b-it-qat-q4_0.gguf
          api_base: http://llama-gemma4-12b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"
          max_parallel_requests: 2
      - model_name: gemma-4-E4B
        litellm_params:
          model: openai/gemma-4-E4B_q4_0-it.gguf
          api_base: http://llama-gemma4-e4b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"
          max_parallel_requests: 1
      - model_name: qwen-coder-7B
        litellm_params:
          model: openai/qwen2.5-coder-7b-instruct-q4_k_m.gguf
          api_base: http://llama-qwen-coder-7b.qwen-coder.svc.cluster.local:8000/v1
          api_key: "sk-no-key"
      - model_name: faster-whisper
        litellm_params:
          model: openai/whisper-1
          api_base: http://faster-whisper.faster-whisper.svc.cluster.local:10300/v1
          api_key: "sk-no-key"
      - model_name: omnivoice
        litellm_params:
          model: openai/tts-1
          api_base: http://omnivoice.omnivoice.svc.cluster.local:8880/v1
          api_key: "sk-no-key"

      # Routing Groups (Aliases)
      
      # "agent" group: Strict fallback chain (26B -> 12B -> E4B)
      - model_name: agent
        litellm_params:
          model: openai/gemma-4-26B_q4_0-it.gguf
          api_base: http://llama-gemma4-26b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"

      # "vision" group: Latency-based routing between E4B and 12B
      - model_name: vision
        litellm_params:
          model: openai/gemma-4-E4B_q4_0-it.gguf
          api_base: http://llama-gemma4-e4b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"
      - model_name: vision
        litellm_params:
          model: openai/gemma-4-12b-it-qat-q4_0.gguf
          api_base: http://llama-gemma4-12b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"

      # "assistant" group: Latency-based routing between 12B and E4B
      - model_name: assistant
        litellm_params:
          model: openai/gemma-4-12b-it-qat-q4_0.gguf
          api_base: http://llama-gemma4-12b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"
      - model_name: assistant
        litellm_params:
          model: openai/gemma-4-E4B_q4_0-it.gguf
          api_base: http://llama-gemma4-e4b.llama.svc.cluster.local:8000/v1
          api_key: "sk-no-key"

      # "code" group
      - model_name: code
        litellm_params:
          model: openai/qwen2.5-coder-7b-instruct-q4_k_m.gguf
          api_base: http://llama-qwen-coder-7b.qwen-coder.svc.cluster.local:8000/v1
          api_key: "sk-no-key"

      # "stt" group
      - model_name: stt
        litellm_params:
          model: openai/whisper-1
          api_base: http://faster-whisper.faster-whisper.svc.cluster.local:10300/v1
          api_key: "sk-no-key"

      # "tts" group
      - model_name: tts
        litellm_params:
          model: openai/tts-1
          api_base: http://omnivoice.omnivoice.svc.cluster.local:8880/v1
          api_key: "sk-no-key"

    router_settings:
      routing_strategy: "latency-based-routing"
      fallbacks:
        - {"agent": ["gemma-4-12B", "gemma-4-E4B"]}

    litellm_settings:
      callbacks:
        - prometheus
      require_auth_for_metrics_endpoint: false
