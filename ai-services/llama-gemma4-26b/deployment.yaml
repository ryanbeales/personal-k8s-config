apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-gemma4-26b
  namespace: vllm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-gemma4-26b
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llama-gemma4-26b
    spec:
      runtimeClassName: nvidia
      nodeName: crobputer
      tolerations:
        - key: dedicated
          operator: Equal
          value: crobputer
          effect: NoSchedule
      initContainers:
        - name: download-model
          image: curlimages/curl:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              if [ ! -f /models/gemma-4-26B_q4_0-it.gguf ]; then
                echo "Downloading google/gemma-4-26B-A4B-it-qat-q4_0-gguf..."
                curl -L -H "Authorization: Bearer $HUGGING_FACE_HUB_TOKEN" -o /models/gemma-4-26B_q4_0-it.gguf "https://huggingface.co/google/gemma-4-26B-A4B-it-qat-q4_0-gguf/resolve/main/gemma-4-26B_q4_0-it.gguf"
              else
                echo "Model already downloaded."
              fi
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
                  optional: true
          volumeMounts:
            - name: cache-volume
              mountPath: /models
      containers:
        - name: llama-cpp
          # renovate: datasource=docker depname=ghcr.io/ggml-org/llama.cpp versioning=loose
          image: ghcr.io/ggml-org/llama.cpp:server-cuda
          command: ["/bin/sh", "-c"]
          args:
            - |
              llama-server \
                -m /models/gemma-4-26B_q4_0-it.gguf \
                -c 131072 \
                -ctk q4_0 \
                -ctv q4_0 \
                --flash-attn \
                -ngl -1 \
                --host 0.0.0.0 \
                --port 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: cache-volume
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
      volumes:
        - name: cache-volume
          persistentVolumeClaim:
            claimName: llama-gemma4-26b-nfs-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
