apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      serviceAccountName: hermes
      initContainers:
        - name: configure-hermes
          # renovate: datasource=docker depname=nousresearch/hermes-agent versioning=loose
          image: nousresearch/hermes-agent:v2026.6.5
          securityContext:
            runAsUser: 10000
          command:
            - sh
            - -c
            - |
              CURRENT_VERSION=""
              if [ -f /opt/data/.local/bin/kubectl ]; then
                CURRENT_VERSION=$(/opt/data/.local/bin/kubectl version --client 2>/dev/null | head -n 1 | grep -oE "v[0-9]+\.[0-9]+\.[0-9]+")
              fi
              if [ "$CURRENT_VERSION" != "v1.35.0" ]; then
                echo "Downloading kubectl v1.35.0 (current is $CURRENT_VERSION)..."
                mkdir -p /opt/data/.local/bin
                curl -sSL -o /opt/data/.local/bin/kubectl "https://dl.k8s.io/release/v1.35.0/bin/linux/amd64/kubectl"
                chmod +x /opt/data/.local/bin/kubectl
              fi
              /opt/hermes/.venv/bin/hermes config set model.provider custom
              /opt/hermes/.venv/bin/hermes config set model.base_url http://llama-gemma4-26b.llama.svc.cluster.local:8000/v1
              /opt/hermes/.venv/bin/hermes config set model.default google/gemma-4-26B-A4B-it-qat-q4_0-gguf
              /opt/hermes/.venv/bin/hermes config set model.context_length 131072
              yes | /opt/hermes/.venv/bin/hermes mcp add searxng --command npx --env npm_config_yes=true --env SEARXNG_URL=http://searxng.searxng.svc.cluster.local:8080 --args mcp-searxng
          volumeMounts:
            - name: storage
              mountPath: /opt/data
      containers:
        - name: hermes
          # renovate: datasource=docker depname=nousresearch/hermes-agent versioning=loose
          image: nousresearch/hermes-agent:v2026.6.5
          command: ["/bin/sh", "-c"]
          args:
            - |
              touch /.dockerenv

              if [ -f /etc/ssl/certs/maddy/ca.crt ]; then
                echo "Adding local Maddy CA to system trust store..."
                cat /etc/ssl/certs/maddy/ca.crt >> /etc/ssl/certs/ca-certificates.crt
              fi

              # PRIVILEGE SEPARATION FOR GITHUB CLI (gh)
              # Why: The Hermes agent runs as a non-root user (e.g., 'hermes') inside the shell tools.
              # If we expose GITHUB_TOKEN directly as an environment variable or keep its configuration
              # in the agent's home folder, the agent can read and exfiltrate the secret.
              # Solution:
              # - Create a dedicated 'github-runner' user whose home directory is strictly restricted (0700).
              # - Authenticate gh under the 'github-runner' context.
              # - Provide a secure wrapper script /usr/local/bin/gh-secure that restricts subcommands
              #   which could leak the token (auth, config, alias, extension).
              # - Expose a public /usr/local/bin/gh shim that transparently runs gh-secure via sudo -u github-runner.

              # 1. Install sudo (required for privilege separation)
              if ! command -v sudo >/dev/null 2>&1; then
                echo "Installing sudo..."
                apt-get update && apt-get install -y sudo
              fi

              # 2. Create the github-runner user if it doesn't exist
              if ! id -u github-runner >/dev/null 2>&1; then
                echo "Creating github-runner user..."
                useradd -m -s /bin/bash github-runner
              fi

              # 3. Secure github-runner's home directory (0700) to prevent other users from reading config files
              chmod 700 /home/github-runner
              chown -R github-runner:github-runner /home/github-runner

              # 4. Copy gh binary to a world-executable system path to bypass NFS traversal permissions for github-runner
              if [ -f /opt/data/gh-cli/bin/gh ]; then
                echo "Copying gh binary to /usr/local/bin/gh-binary..."
                cp /opt/data/gh-cli/bin/gh /usr/local/bin/gh-binary
                chmod 755 /usr/local/bin/gh-binary
              fi

              # 5. Log into GitHub CLI as the github-runner user by writing the hosts.yml config file directly.
              # This bypasses the default scope validation in 'gh auth login' (which requires 'read:org' scope).
              if [ -n "$GITHUB_TOKEN" ]; then
                echo "Writing GitHub CLI configuration for github-runner..."
                mkdir -p /home/github-runner/.config/gh || echo "ERROR: mkdir failed"
                printf "github.com:\n    git_protocol: https\n    user: hermes-agent\n    oauth_token: %s\n" "$GITHUB_TOKEN" > /home/github-runner/.config/gh/hosts.yml || echo "ERROR: printf failed"
                chown -R github-runner:github-runner /home/github-runner/.config || echo "ERROR: chown failed"
                chmod 600 /home/github-runner/.config/gh/hosts.yml || echo "ERROR: chmod failed"
                
                # Configure git identity for github-runner
                runuser -u github-runner -- git config --global user.name "hermes-agent" || echo "ERROR: git config 1 failed"
                runuser -u github-runner -- git config --global user.email "hermes@ryanbeales.com" || echo "ERROR: git config 2 failed"
              fi

              # 6. Create a secure wrapper script that blocks credentials leakage (e.g., 'gh auth token')
              # We use base64 decoding here to avoid shell parser and yaml indentation issues with heredocs.
              echo "" | base64 -d > /usr/local/bin/gh-secure
              chmod 755 /usr/local/bin/gh-secure
              chown root:root /usr/local/bin/gh-secure

              # 7. Create the public 'gh' command that redirects via sudo
              echo "IyEvYmluL2Jhc2gKZXhlYyBzdWRvIC1IIC11IGdpdGh1Yi1ydW5uZXIgL3Vzci9sb2NhbC9iaW4vZ2gtc2VjdXJlICIkQCIK" | base64 -d > /usr/local/bin/gh
              chmod 755 /usr/local/bin/gh
              chown root:root /usr/local/bin/gh

              # 8. Allow any user in the container (such as hermes) to run gh-secure as github-runner without a password
              echo "ALL ALL=(github-runner) NOPASSWD: /usr/local/bin/gh-secure" > /etc/sudoers.d/github-runner
              chmod 0440 /etc/sudoers.d/github-runner

              echo "Starting s6-overlay init..."
              exec /init sleep infinity
          tty: true
          stdin: true
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"

            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: "hermes-local-key"
            - name: API_SERVER_CORS_ORIGINS
              value: "*"
            - name: EMAIL_ADDRESS
              value: "hermes@ryanbeales.com"
            - name: EMAIL_PASSWORD
              value: "hermes-local-imap-pass"
            - name: EMAIL_IMAP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: EMAIL_IMAP_PORT
              value: "993"
            - name: EMAIL_SMTP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: EMAIL_SMTP_PORT
              value: "587"
            - name: EMAIL_POLL_INTERVAL
              value: "15"
            - name: EMAIL_ALLOWED_USERS
              value: "ryanbeales@gmail.com"
            - name: EMAIL_HOME_ADDRESS
              value: "ryanbeales@gmail.com"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-github-secret
                  key: GITHUB_TOKEN
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gemini-secret
                  key: GEMINI_API_KEY
          ports:
            - name: api
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          volumeMounts:
            - name: storage
              mountPath: /opt/data
            - name: maddy-ca
              mountPath: /etc/ssl/certs/maddy
              readOnly: true
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: hermes-nfs-pvc
        - name: maddy-ca
          secret:
            secretName: maddy-ca-tls
