apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      initContainers:
        - name: configure-hermes
          image: nousresearch/hermes-agent:latest
          securityContext:
            runAsUser: 10000
          command:
            - sh
            - -c
            - |
              /opt/hermes/.venv/bin/hermes config set model.provider custom
              /opt/hermes/.venv/bin/hermes config set model.base_url http://ollama-large.ollama.svc.cluster.local:11434/v1
              /opt/hermes/.venv/bin/hermes config set model.default gemma4:26b
              yes | /opt/hermes/.venv/bin/hermes mcp add searxng --command npx --env npm_config_yes=true --env SEARXNG_URL=http://searxng.searxng.svc.cluster.local:8080 --args mcp-searxng
          volumeMounts:
            - name: storage
              mountPath: /opt/data
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          tty: true
          stdin: true
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"

            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: "hermes-local-key"
            - name: API_SERVER_CORS_ORIGINS
              value: "*"
            - name: IMAP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: IMAP_PORT
              value: "143"
            - name: IMAP_USER
              value: "hermes@ryanbeales.com"
            - name: IMAP_PASSWORD
              value: "hermes-local-imap-pass"
            - name: SMTP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: "hermes@ryanbeales.com"
            - name: SMTP_PASSWORD
              value: "hermes-local-imap-pass"
          ports:
            - name: api
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          volumeMounts:
            - name: storage
              mountPath: /opt/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: hermes-nfs-pvc
