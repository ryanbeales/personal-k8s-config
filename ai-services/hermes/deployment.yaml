apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      serviceAccountName: hermes
      initContainers:
        - name: configure-hermes
          # renovate: datasource=docker depname=nousresearch/hermes-agent versioning=loose
          image: nousresearch/hermes-agent:v2026.6.19
          securityContext:
            runAsUser: 10000
          command:
            - sh
            - -c
            - |
              CURRENT_VERSION=""
              if [ -f /opt/data/.local/bin/kubectl ]; then
                CURRENT_VERSION=$(/opt/data/.local/bin/kubectl version --client 2>/dev/null | head -n 1 | grep -oE "v[0-9]+\.[0-9]+\.[0-9]+")
              fi
              if [ "$CURRENT_VERSION" != "v1.35.0" ]; then
                echo "Downloading kubectl v1.35.0 (current is $CURRENT_VERSION)..."
                mkdir -p /opt/data/.local/bin
                curl -sSL -o /opt/data/.local/bin/kubectl "https://dl.k8s.io/release/v1.35.0/bin/linux/amd64/kubectl"
                chmod +x /opt/data/.local/bin/kubectl
              fi
              /opt/hermes/.venv/bin/hermes config set model.provider custom
              /opt/hermes/.venv/bin/hermes config set model.base_url http://llama-gemma4-26b.llama.svc.cluster.local:8000/v1
              /opt/hermes/.venv/bin/hermes config set model.default google/gemma-4-26B-A4B-it-qat-q4_0-gguf
              /opt/hermes/.venv/bin/hermes config set model.context_length 131072
          volumeMounts:
            - name: storage
              mountPath: /opt/data
      containers:
        - name: hermes
          # renovate: datasource=docker depname=nousresearch/hermes-agent versioning=loose
          image: nousresearch/hermes-agent:v2026.6.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              touch /.dockerenv

              if [ -f /etc/ssl/certs/maddy/ca.crt ]; then
                echo "Adding local Maddy CA to system trust store..."
                cat /etc/ssl/certs/maddy/ca.crt >> /etc/ssl/certs/ca-certificates.crt
              fi

              # Copy the pre-installed gh binary to /usr/local/bin/gh so it's in the global PATH
              if [ -f /opt/data/gh-cli/bin/gh ]; then
                echo "Copying gh binary to /usr/local/bin/gh..."
                cp /opt/data/gh-cli/bin/gh /usr/local/bin/gh
                chmod 755 /usr/local/bin/gh
              fi

              # Configure git and gh credentials directly for the hermes user (UID 10000)
              if [ -n "$GITHUB_TOKEN" ]; then
                echo "Writing Git configuration and credentials for hermes user..."
                runuser -u hermes -- git config --global user.name "hermes-agent" || echo "ERROR: git config hermes name failed"
                runuser -u hermes -- git config --global user.email "hermes@ryanbeales.com" || echo "ERROR: git config hermes email failed"
                runuser -u hermes -- git config --global credential.helper store || echo "ERROR: git config hermes helper failed"
                
                printf "https://oauth2:%s@github.com\n" "$GITHUB_TOKEN" > /opt/data/.git-credentials
                chown hermes:hermes /opt/data/.git-credentials
                chmod 600 /opt/data/.git-credentials

                echo "Writing GitHub CLI configuration for hermes user..."
                mkdir -p /opt/data/.config/gh || echo "ERROR: mkdir failed"
                printf "github.com:\n    git_protocol: https\n    user: hermes-agent\n    oauth_token: %s\n" "$GITHUB_TOKEN" > /opt/data/.config/gh/hosts.yml || echo "ERROR: printf failed"
                chown -R hermes:hermes /opt/data/.config || echo "ERROR: chown failed"
                chmod 600 /opt/data/.config/gh/hosts.yml || echo "ERROR: chmod failed"
              fi

              echo "Starting s6-overlay init..."
              exec /init sleep infinity
          tty: true
          stdin: true
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"

            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: "hermes-local-key"
            - name: API_SERVER_CORS_ORIGINS
              value: "*"
            - name: EMAIL_ADDRESS
              value: "hermes@ryanbeales.com"
            - name: EMAIL_PASSWORD
              value: "hermes-local-imap-pass"
            - name: EMAIL_IMAP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: EMAIL_IMAP_PORT
              value: "993"
            - name: EMAIL_SMTP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: EMAIL_SMTP_PORT
              value: "587"
            - name: EMAIL_POLL_INTERVAL
              value: "15"
            - name: EMAIL_ALLOWED_USERS
              value: "ryanbeales@gmail.com"
            - name: EMAIL_HOME_ADDRESS
              value: "ryanbeales@gmail.com"
            - name: MATRIX_HOMESERVER
              value: "http://conduit.conduit.svc.cluster.local:6167"
            - name: MATRIX_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-matrix-secret
                  key: MATRIX_ACCESS_TOKEN
            - name: MATRIX_ALLOWED_USERS
              value: "@ryanbeales:matrix.crobasaurusrex.ryanbeales.com"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-github-secret
                  key: GITHUB_TOKEN
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gemini-secret
                  key: GEMINI_API_KEY
          ports:
            - name: api
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          volumeMounts:
            - name: storage
              mountPath: /opt/data
            - name: maddy-ca
              mountPath: /etc/ssl/certs/maddy
              readOnly: true
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: hermes-nfs-pvc
        - name: maddy-ca
          secret:
            secretName: maddy-ca-tls
