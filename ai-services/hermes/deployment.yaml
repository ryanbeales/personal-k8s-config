apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          tty: true
          stdin: true
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"

            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: "hermes-local-key"
            - name: API_SERVER_CORS_ORIGINS
              value: "*"
          ports:
            - name: api
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          volumeMounts:
            - name: storage
              mountPath: /opt/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: hermes-nfs-pvc
