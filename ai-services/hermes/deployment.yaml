apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      initContainers:
        - name: configure-hermes
          # renovate: datasource=docker depname=nousresearch/hermes-agent versioning=loose
          image: nousresearch/hermes-agent:v2026.5.29.2
          securityContext:
            runAsUser: 10000
          command:
            - sh
            - -c
            - |
              /opt/hermes/.venv/bin/hermes config set model.provider custom
              /opt/hermes/.venv/bin/hermes config set model.base_url http://ollama-large.ollama.svc.cluster.local:11434/v1
              /opt/hermes/.venv/bin/hermes config set model.default gemma4:26b
              yes | /opt/hermes/.venv/bin/hermes mcp add searxng --command npx --env npm_config_yes=true --env SEARXNG_URL=http://searxng.searxng.svc.cluster.local:8080 --args mcp-searxng
          volumeMounts:
            - name: storage
              mountPath: /opt/data
      containers:
        - name: hermes
          # renovate: datasource=docker depname=nousresearch/hermes-agent versioning=loose
          image: nousresearch/hermes-agent:v2026.5.29.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Patching Hermes Agent email adapter for cluster-local plain-text connection..."
              sed -i 's/imaplib.IMAP4_SSL/imaplib.IMAP4/g' /opt/hermes/gateway/platforms/email.py
              sed -i 's/smtp.starttls/# smtp.starttls/g' /opt/hermes/gateway/platforms/email.py
              echo "Starting Hermes Agent gateway..."
              exec /init /opt/hermes/docker/main-wrapper.sh gateway run
          tty: true
          stdin: true
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"

            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: "hermes-local-key"
            - name: API_SERVER_CORS_ORIGINS
              value: "*"
            - name: EMAIL_ADDRESS
              value: "hermes@ryanbeales.com"
            - name: EMAIL_PASSWORD
              value: "hermes-local-imap-pass"
            - name: EMAIL_IMAP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: EMAIL_IMAP_PORT
              value: "143"
            - name: EMAIL_SMTP_HOST
              value: "maddy.maddy.svc.cluster.local"
            - name: EMAIL_SMTP_PORT
              value: "587"
            - name: EMAIL_POLL_INTERVAL
              value: "15"
            - name: EMAIL_ALLOWED_USERS
              value: "ryanbeales@gmail.com"
            - name: EMAIL_HOME_ADDRESS
              value: "ryanbeales@gmail.com"
          ports:
            - name: api
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          volumeMounts:
            - name: storage
              mountPath: /opt/data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: hermes-nfs-pvc
