apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hermes-cluster-reader
rules:
  # Read-only access to standard namespaced resources (except secrets)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - services
      - services/status
      - endpoints
      - configmaps
      - persistentvolumeclaims
      - namespaces
      - replicationcontrollers
      - events
    verbs: ["get", "list", "watch"]
  # Read-only access to cluster-wide resources (except secrets)
  - apiGroups: [""]
    resources:
      - nodes
      - persistentvolumes
    verbs: ["get", "list", "watch"]
  # Read-only access to apps
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Read-only access to batch jobs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # Read-only access to networking/gateway API
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "gatewayclasses", "httproutes"]
    verbs: ["get", "list", "watch"]
  # Read-only access to storage classes
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  # Read-only access to certificates
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers", "clusterissuers"]
    verbs: ["get", "list", "watch"]
  # Read-only access to custom resource definitions
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Read-only access to ArgoCD apps
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["get", "list", "watch"]
  # Ability to execute commands in containers (subresource pods/exec)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
