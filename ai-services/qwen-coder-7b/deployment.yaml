apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-coder-7b
  namespace: qwen-coder
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen-coder-7b
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen-coder-7b
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-3060
      initContainers:
        - name: download-model
          image: curlimages/curl:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              if [ ! -f /models/qwen2.5-coder-7b-instruct-q4_k_m.gguf ]; then
                echo "Downloading Qwen2.5-Coder-7B-Instruct..."
                curl -L -H "Authorization: Bearer $HUGGING_FACE_HUB_TOKEN" \
                  -o /models/qwen2.5-coder-7b-instruct-q4_k_m.gguf \
                  "https://huggingface.co/Qwen/Qwen2.5-Coder-7B-Instruct-GGUF/resolve/main/qwen2.5-coder-7b-instruct-q4_k_m.gguf"
              else
                echo "Model already downloaded."
              fi
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
                  optional: true
          volumeMounts:
            - name: cache-volume
              mountPath: /models
      containers:
        - name: llama-cpp
          # renovate: datasource=docker depname=ghcr.io/ggml-org/llama.cpp versioning=loose
          image: ghcr.io/ggml-org/llama.cpp:server-cuda
          command: ["/bin/sh", "-c"]
          args:
            - |
              /app/llama-server \
                -m /models/qwen2.5-coder-7b-instruct-q4_k_m.gguf \
                -c 8192 \
                -np 1 \
                -ctk q4_0 \
                -ctv q4_0 \
                --flash-attn on \
                -ngl -1 \
                --host 0.0.0.0 \
                --port 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: cache-volume
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
      volumes:
        - name: cache-volume
          persistentVolumeClaim:
            claimName: qwen-coder-7b-nfs-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
