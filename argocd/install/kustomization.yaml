resources:
  # https://github.com/argoproj/argo-cd/releases
  # renovate: datasource=github-tags depname=argoproj/argo-cd versioning=semver
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.7/manifests/install.yaml
# Delete included argocd-cm so we can provide our own.
patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm

  # Delete ingress so we can provide our own
  - target:
      kind: Ingress
      name: argocd-server
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: argocd-server
  # Enable rbac role for web terminal
  - target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: ClusterRole
      name: argocd-server
    patch: |-
      - op: add
        path: /rules/0
        value:
          apiGroups:
            - ''
          resources:
            - pods/exec
          verbs:
            - create

  - target:
      kind: Deployment
      name: argocd-repo-server
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-repo-server
      spec:
        template:
          spec:
            initContainers:
            - name: copyutil
              args:
              - "/bin/cp --update=none /usr/local/bin/argocd /var/run/argocd/argocd && /bin/ln -sf /var/run/argocd/argocd /var/run/argocd/argocd-cmp-server"
